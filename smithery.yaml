name: mcp-tcmb-exchange
description: >
  TCMB (Turkish Central Bank) daily exchange rates via MCP.
  Supports live rates, currency conversion (TRY↔USD/EUR/GBP),
  cross-rate calculation and historical data by date.
categories:
  - finance
  - currency
  - turkey
license: MIT
startCommand:
  type: stdio
  command: npx
  args: ["-y", "mcp-tcmb-exchange@latest"]