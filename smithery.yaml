name: mcp-tcmb-exchange
description: >
  TCMB (Turkish Central Bank) daily exchange rates via MCP.
  Supports live rates, currency conversion (TRY↔USD/EUR/GBP),
  cross-rate calculation and historical data by date.
categories:
  - finance
  - currency
  - turkey
license: MIT
startCommand:
  type: stdio
  command: uvx
  args: ["mcp-tcmb-exchange"]
configSchema:
  type: object
  properties:
    bypass_auto_scan:
      type: boolean
      description: Bypass the 502 auto-scan initialization error
      default: true